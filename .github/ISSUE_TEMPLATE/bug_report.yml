name: 🐛 Bug Report
description: Create a report to help us reproduce and fix a bug
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below as accurately as possible.

  - type: input
    id: environment
    attributes:
      label: Environment & Versions
      description: What server software, Java version, and Cotani version are you using?
      placeholder: e.g. Paper 1.20.4, Java 21, Cotani 1.0.0
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      description: Which Cotani module does this issue affect?
      options:
        - cotani-core
        - cotani-task
        - cotani-cache
        - cotani-config
        - cotani-storage
        - cotani-user
        - cotani-economy
        - cotani-teleport
        - cotani-cooldown
        - cotani-event
        - cotani-item
        - cotani-text
        - Multiple / Unknown
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Call `service.doSomethingAsync()`
        2. Execute command...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Stack Trace / Error Logs
      description: Paste any relevant error logs or stack traces here.
      render: text
    validations:
      required: false
