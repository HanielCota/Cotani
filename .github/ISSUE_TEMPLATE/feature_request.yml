name: ✨ Feature Request
description: Suggest an idea or new feature for Cotani
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your proposal in detail below.

  - type: dropdown
    id: module
    attributes:
      label: Target Module
      description: Which Cotani module would benefit from this feature?
      options:
        - cotani-core
        - cotani-task
        - cotani-cache
        - cotani-config
        - cotani-storage
        - cotani-user
        - cotani-economy
        - cotani-teleport
        - cotani-cooldown
        - cotani-event
        - cotani-item
        - cotani-text
        - New Module Proposal
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear description of what problem or limitation you are facing.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the Solution You'd Like
      description: A clear and concise description of what you want to happen or API contract you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe Alternatives You've Considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false
