name: SonarQube Cloud Analysis

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: SonarQube Cloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew

      - name: Compile Classes for Sonar Analysis
        run: ./gradlew compileJava compileTestJava

      - name: SonarQube Cloud Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Skip Scan Notice (Missing SONAR_TOKEN)
        if: ${{ secrets.SONAR_TOKEN == '' }}
        run: |
          echo "::warning title=SONAR_TOKEN Missing::SonarQube Cloud scan skipped because SONAR_TOKEN secret is not set in GitHub Secrets. Please add SONAR_TOKEN under Repository Settings > Secrets > Actions."
